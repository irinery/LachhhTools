name: Resolve Release Version
description: Resolve preview and official release versions from PR labels and stable tags.

inputs:
  labels_json:
    description: JSON array containing PR labels.
    required: false
    default: "[]"
  pr_number:
    description: Pull request number for preview artifact naming.
    required: false
    default: ""
  sha:
    description: Commit SHA used for preview context and rerun-safe release reuse.
    required: false
    default: ""
  preview_mode:
    description: Set to true for preview artifacts and false for official merge releases.
    required: false
    default: "true"
  require_semver_label:
    description: Fail when no semver label is present.
    required: false
    default: "false"
  require_platform_label:
    description: Fail when no platform label is present.
    required: false
    default: "false"
  fallback_semver_label:
    description: Fallback semver label used when labels are optional.
    required: false
    default: "semver:patch"
  fallback_platform_label:
    description: Fallback platform label used when labels are optional.
    required: false
    default: "platform:both"

outputs:
  app_version:
    description: Version number without the v prefix.
    value: ${{ steps.resolve.outputs.app_version }}
  windows_tag:
    description: Version tag for Windows release.
    value: ${{ steps.resolve.outputs.windows_tag }}
  mac_tag:
    description: Version tag for macOS release.
    value: ${{ steps.resolve.outputs.mac_tag }}
  artifact_suffix:
    description: Suffix used for preview or official artifacts.
    value: ${{ steps.resolve.outputs.artifact_suffix }}
  is_preview:
    description: Whether the resolved version is for preview artifacts.
    value: ${{ steps.resolve.outputs.is_preview }}
  bump:
    description: SemVer bump selected from PR labels.
    value: ${{ steps.resolve.outputs.bump }}
  semver_label:
    description: The resolved semver label.
    value: ${{ steps.resolve.outputs.semver_label }}
  latest_tag:
    description: Latest stable tag considered for the calculation.
    value: ${{ steps.resolve.outputs.latest_tag }}
  reused_existing_tag:
    description: Whether an existing tag pointing at the target SHA was reused.
    value: ${{ steps.resolve.outputs.reused_existing_tag }}
  platform_label:
    description: The resolved platform label.
    value: ${{ steps.resolve.outputs.platform_label }}
  release_windows:
    description: Whether the workflow should release Windows artifacts.
    value: ${{ steps.resolve.outputs.release_windows }}
  release_macos:
    description: Whether the workflow should release macOS artifacts.
    value: ${{ steps.resolve.outputs.release_macos }}

runs:
  using: composite
  steps:
    - id: resolve
      shell: bash
      env:
        LABELS_JSON: ${{ inputs.labels_json }}
        PR_NUMBER: ${{ inputs.pr_number }}
        SHA: ${{ inputs.sha }}
        PREVIEW_MODE: ${{ inputs.preview_mode }}
        REQUIRE_SEMVER_LABEL: ${{ inputs.require_semver_label }}
        REQUIRE_PLATFORM_LABEL: ${{ inputs.require_platform_label }}
        FALLBACK_SEMVER_LABEL: ${{ inputs.fallback_semver_label }}
        FALLBACK_PLATFORM_LABEL: ${{ inputs.fallback_platform_label }}
      run: |
        set -euo pipefail

        normalize_version_from_tag() {
          local tag_name="$1"
          tag_name="${tag_name#v}"
          tag_name="${tag_name%-mac}"
          printf '%s' "$tag_name"
        }

        tag_points_at_sha() {
          local tag_name="$1"
          local target_sha="$2"
          [[ -n "${target_sha}" ]] || return 1
          [[ "$(git rev-list -n 1 "${tag_name}" 2>/dev/null || true)" == "${target_sha}" ]]
        }

        select_single_label() {
          local label_kind="$1"
          local require_label="$2"
          local fallback_label="$3"
          shift 3
          local matches=("$@")
          local count="${#matches[@]}"

          if (( count > 1 )); then
            echo "Labels ${label_kind} conflitantes: ${matches[*]}"
            exit 1
          fi

          if (( count == 0 )); then
            if [[ "${require_label}" == "true" ]]; then
              echo "Label obrigatoria ausente para ${label_kind}."
              exit 1
            fi
            printf '%s' "${fallback_label}"
            return 0
          fi

          printf '%s' "${matches[0]}"
        }

        git fetch --force --tags origin

        require_semver_label_effective="${REQUIRE_SEMVER_LABEL,,}"
        require_platform_label_effective="${REQUIRE_PLATFORM_LABEL,,}"
        preview_mode_effective="${PREVIEW_MODE,,}"

        # Em modo preview, os labels podem não existir (ex.: PRs técnicos como "codex").
        # Nesse caso sempre usamos fallback para evitar falha desnecessária de CI.
        if [[ "${preview_mode_effective}" == "true" ]]; then
          require_semver_label_effective="false"
          require_platform_label_effective="false"
        fi

        semver_matches=()
        for label_name in semver:major semver:minor semver:patch; do
          if [[ "${LABELS_JSON}" == *"\"${label_name}\""* ]]; then
            semver_matches+=("${label_name}")
          fi
        done

        platform_matches=()
        for label_name in platform:windows platform:macos platform:both; do
          if [[ "${LABELS_JSON}" == *"\"${label_name}\""* ]]; then
            platform_matches+=("${label_name}")
          fi
        done

        semver_label="$(select_single_label "semver" "${require_semver_label_effective}" "${FALLBACK_SEMVER_LABEL}" "${semver_matches[@]}")"
        platform_label="$(select_single_label "platform" "${require_platform_label_effective}" "${FALLBACK_PLATFORM_LABEL}" "${platform_matches[@]}")"

        bump="${semver_label#semver:}"

        case "${platform_label}" in
          platform:windows)
            release_windows="true"
            release_macos="false"
            ;;
          platform:macos)
            release_windows="false"
            release_macos="true"
            ;;
          platform:both)
            release_windows="true"
            release_macos="true"
            ;;
          *)
            echo "Platform label invalida: ${platform_label}"
            exit 1
            ;;
        esac

        latest_tag="$(git tag --list --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -n 1 || true)"
        if [[ -z "${latest_tag}" ]]; then
          latest_tag="v0.0.0"
        fi

        reused_existing_tag="false"
        existing_version=""

        if [[ "${PREVIEW_MODE}" != "true" && -n "${SHA}" ]]; then
          while IFS= read -r tag_name; do
            [[ -n "${tag_name}" ]] || continue
            if tag_points_at_sha "${tag_name}" "${SHA}"; then
              existing_version="$(normalize_version_from_tag "${tag_name}")"
              reused_existing_tag="true"
              break
            fi
          done < <(git tag --list | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | sort -V)

          if [[ -z "${existing_version}" ]]; then
            while IFS= read -r tag_name; do
              [[ -n "${tag_name}" ]] || continue
              if tag_points_at_sha "${tag_name}" "${SHA}"; then
                existing_version="$(normalize_version_from_tag "${tag_name}")"
                reused_existing_tag="true"
                break
              fi
            done < <(git tag --list | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+-mac$' | sort -V)
          fi
        fi

        if [[ -n "${existing_version}" ]]; then
          app_version="${existing_version}"
          latest_tag="v${existing_version}"
        else
          raw_version="${latest_tag#v}"
          IFS='.' read -r major minor patch <<< "${raw_version}"

          case "${bump}" in
            major)
              major=$((major + 1))
              minor=0
              patch=0
              ;;
            minor)
              minor=$((minor + 1))
              patch=0
              ;;
            patch)
              patch=$((patch + 1))
              ;;
            *)
              echo "Bump invalido: ${bump}"
              exit 1
              ;;
          esac

          app_version="${major}.${minor}.${patch}"
        fi

        windows_tag="v${app_version}"
        mac_tag="${windows_tag}-mac"

        short_sha="${SHA:0:7}"
        if [[ "${PREVIEW_MODE}" == "true" ]]; then
          is_preview="true"
          if [[ -n "${PR_NUMBER}" ]]; then
            artifact_suffix="pr-${PR_NUMBER}-v${app_version}-preview"
          else
            artifact_suffix="commit-${short_sha:-unknown}-v${app_version}-preview"
          fi
        else
          is_preview="false"
          artifact_suffix="v${app_version}"
        fi

        {
          echo "app_version=${app_version}"
          echo "windows_tag=${windows_tag}"
          echo "mac_tag=${mac_tag}"
          echo "artifact_suffix=${artifact_suffix}"
          echo "is_preview=${is_preview}"
          echo "bump=${bump}"
          echo "semver_label=${semver_label}"
          echo "latest_tag=${latest_tag}"
          echo "reused_existing_tag=${reused_existing_tag}"
          echo "platform_label=${platform_label}"
          echo "release_windows=${release_windows}"
          echo "release_macos=${release_macos}"
        } >> "${GITHUB_OUTPUT}"
