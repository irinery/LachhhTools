name: Release macOS (.app)

on:
  push:
    tags:
      - "v0.0.1-mac"

permissions:
  contents: write

jobs:
  release-macos:
    name: Build + Release (macOS Only)
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "11"

      - name: Setup HARMAN AIR SDK
        uses: joshtynjala/setup-adobe-air-action@v2
        with:
          air-version: "50.2.4.2"
          accept-license: true

      - name: Resolve Version from Tag
        id: version
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG%-mac}"
          VERSION="${VERSION#v}"
          echo "tag=${TAG}" >> "${GITHUB_OUTPUT}"
          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"
          echo "mac_release_version=v${VERSION}" >> "${GITHUB_OUTPUT}"
          echo "Tag: ${TAG}"
          echo "App version: ${VERSION}"

      - name: Build macOS Bundle
        shell: bash
        env:
          APP_VERSION: ${{ steps.version.outputs.version }}
          PACKAGE_TARGET: bundle
        run: |
          ./scripts/build.sh
          test -d "./installers/LachhhTools.app"
          test -f "./bin/TwitchGiveawayTool.swf"

      - name: Archive macOS App Bundle
        shell: bash
        run: |
          ditto -c -k --sequesterRsrc --keepParent \
            "./installers/LachhhTools.app" \
            "./installers/LachhhTools-macOS-v${{ steps.version.outputs.version }}.zip"
          test -f "./installers/LachhhTools-macOS-v${{ steps.version.outputs.version }}.zip"

      - name: Create GitHub Release (macOS Only)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: LachhhTools ${{ steps.version.outputs.mac_release_version }} (macOS)
          body: |
            Release gerada automaticamente por tag de versão.

            macOS APENAS:
            - Arquivo para download: `LachhhTools-macOS-v${{ steps.version.outputs.version }}.zip`
          files: |
            installers/LachhhTools-macOS-v${{ steps.version.outputs.version }}.zip
          fail_on_unmatched_files: true
