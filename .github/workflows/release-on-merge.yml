name: Release On Merge

on:
  pull_request:
    types:
      - closed

permissions:
  contents: write
  pull-requests: read

concurrency:
  group: release-on-merge-${{ github.event.pull_request.base.ref }}
  cancel-in-progress: false

jobs:
  prepare-release:
    name: Resolve Release Version
    if: >-
      github.event.pull_request.merged == true &&
      (github.event.pull_request.base.ref == 'master' || github.event.pull_request.base.ref == 'main')
    runs-on: ubuntu-latest
    outputs:
      merge_sha: ${{ steps.context.outputs.merge_sha }}
      app_version: ${{ steps.version.outputs.app_version }}
      windows_tag: ${{ steps.version.outputs.windows_tag }}
      mac_tag: ${{ steps.version.outputs.mac_tag }}
      artifact_suffix: ${{ steps.version.outputs.artifact_suffix }}
      reused_existing_tag: ${{ steps.version.outputs.reused_existing_tag }}
      semver_label: ${{ steps.version.outputs.semver_label }}
      platform_label: ${{ steps.version.outputs.platform_label }}
      release_windows: ${{ steps.version.outputs.release_windows }}
      release_macos: ${{ steps.version.outputs.release_macos }}

    steps:
      - name: Resolve merge commit SHA
        id: context
        run: |
          merge_sha="${{ github.event.pull_request.merge_commit_sha }}"
          if [[ -z "${merge_sha}" ]]; then
            echo "merge_commit_sha ausente no evento."
            exit 1
          fi
          echo "merge_sha=${merge_sha}" >> "${GITHUB_OUTPUT}"

      - name: Checkout merge commit
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.context.outputs.merge_sha }}
          fetch-depth: 0

      - name: Resolve release version
        id: version
        uses: ./.github/actions/resolve-release-version
        with:
          labels_json: ${{ toJson(github.event.pull_request.labels.*.name) }}
          pr_number: ${{ github.event.pull_request.number }}
          sha: ${{ steps.context.outputs.merge_sha }}
          preview_mode: "false"
          require_semver_label: "true"
          require_platform_label: "true"

      - name: Release summary
        run: |
          {
            echo "## Release On Merge"
            echo "- PR: #${{ github.event.pull_request.number }}"
            echo "- Merge SHA: \`${{ steps.context.outputs.merge_sha }}\`"
            echo "- SemVer label: \`${{ steps.version.outputs.semver_label }}\`"
            echo "- Platform label: \`${{ steps.version.outputs.platform_label }}\`"
            echo "- App version: \`v${{ steps.version.outputs.app_version }}\`"
            echo "- Windows tag: \`${{ steps.version.outputs.windows_tag }}\`"
            echo "- macOS tag: \`${{ steps.version.outputs.mac_tag }}\`"
            echo "- Release Windows: \`${{ steps.version.outputs.release_windows }}\`"
            echo "- Release macOS: \`${{ steps.version.outputs.release_macos }}\`"
            echo "- Reused existing tag: \`${{ steps.version.outputs.reused_existing_tag }}\`"
          } >> "${GITHUB_STEP_SUMMARY}"

  integration-windows:
    name: Integration Gate (Windows)
    needs: prepare-release
    if: needs.prepare-release.outputs.release_windows == 'true'
    runs-on: windows-latest

    steps:
      - name: Checkout merge commit
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare-release.outputs.merge_sha }}

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "11"

      - name: Setup HARMAN AIR SDK
        uses: joshtynjala/setup-adobe-air-action@v2
        with:
          air-version: "50.2.4.2"
          accept-license: true

      - name: Run Windows integration gate
        shell: powershell
        run: |
          .\scripts\windows-integration-gate.ps1 -RootDir "$PWD"

  build-windows-release:
    name: Build Release (Windows)
    needs:
      - prepare-release
      - integration-windows
    if: needs.prepare-release.outputs.release_windows == 'true'
    runs-on: windows-latest

    steps:
      - name: Checkout merge commit
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare-release.outputs.merge_sha }}

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "11"

      - name: Setup HARMAN AIR SDK
        uses: joshtynjala/setup-adobe-air-action@v2
        with:
          air-version: "50.2.4.2"
          accept-license: true

      - name: Build Windows executable
        shell: powershell
        env:
          APP_VERSION: ${{ needs.prepare-release.outputs.app_version }}
        run: |
          .\scripts\build.ps1 -PackageTarget native
          if (-not (Test-Path ".\installers\LachhhTools.exe")) {
            throw "Executavel nao encontrado em installers/LachhhTools.exe"
          }

      - name: Validate Windows build assets
        shell: powershell
        run: |
          .\scripts\validate-windows-assets.ps1 `
            -RootDir "$PWD" `
            -ReportDir ".\build\reports"

      - name: Post-build smoke test (Windows artifacts)
        shell: powershell
        run: |
          $required = @(
            ".\bin\TwitchGiveawayTool.swf",
            ".\installers\LachhhTools.exe",
            ".\build\reports\windows-assets-validation.json",
            ".\build\reports\windows-assets-validation.txt"
          )
          foreach ($path in $required) {
            if (-not (Test-Path $path)) {
              throw "Arquivo obrigatorio ausente no smoke test: $path"
            }
          }
          $exeSize = (Get-Item ".\installers\LachhhTools.exe").Length
          if ($exeSize -le 1MB) {
            throw "Executavel com tamanho inesperado (<= 1MB): $exeSize bytes"
          }

      - name: Critical smoke test (Windows flow)
        shell: powershell
        run: |
          .\scripts\windows-critical-smoke.ps1 `
            -RootDir "$PWD" `
            -ValidationReportPath ".\build\reports\windows-assets-validation.json"

      - name: Create versioned Windows release asset
        shell: powershell
        env:
          APP_VERSION: ${{ needs.prepare-release.outputs.app_version }}
        run: |
          $versionedExe = ".\installers\LachhhTools-Windows-v$env:APP_VERSION.exe"
          Copy-Item ".\installers\LachhhTools.exe" $versionedExe -Force
          if (-not (Test-Path $versionedExe)) {
            throw "Executavel versionado nao encontrado: $versionedExe"
          }

      - name: Upload Windows release artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-windows-v${{ needs.prepare-release.outputs.app_version }}
          path: |
            installers/LachhhTools-Windows-v${{ needs.prepare-release.outputs.app_version }}.exe
            build/reports/windows-assets-validation.json
            build/reports/windows-assets-validation.txt
            build/reports/windows-critical-smoke.json
            build/reports/windows-critical-smoke.txt

  publish-windows-release:
    name: Publish Release (Windows)
    needs:
      - prepare-release
      - build-windows-release
    if: needs.prepare-release.outputs.release_windows == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout merge commit
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare-release.outputs.merge_sha }}
          fetch-depth: 0

      - name: Fetch tags
        run: |
          git fetch --force --tags origin

      - name: Configure Git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Download Windows release artifact
        uses: actions/download-artifact@v4
        with:
          name: release-windows-v${{ needs.prepare-release.outputs.app_version }}
          path: dist/windows

      - name: Ensure Windows tag exists
        env:
          MERGE_SHA: ${{ needs.prepare-release.outputs.merge_sha }}
          WINDOWS_TAG: ${{ needs.prepare-release.outputs.windows_tag }}
        run: |
          set -euo pipefail

          if git ls-remote --tags --refs origin "refs/tags/${WINDOWS_TAG}" | grep -q .; then
            echo "Tag ja existe no remoto: ${WINDOWS_TAG}"
            exit 0
          fi

          git tag -a "${WINDOWS_TAG}" "${MERGE_SHA}" -m "Release Windows ${WINDOWS_TAG}"

          if git push origin "refs/tags/${WINDOWS_TAG}"; then
            echo "Tag publicada: ${WINDOWS_TAG}"
            exit 0
          fi

          git fetch --force --tags origin
          if git ls-remote --tags --refs origin "refs/tags/${WINDOWS_TAG}" | grep -q .; then
            echo "Tag confirmada apos rechecagem: ${WINDOWS_TAG}"
            exit 0
          fi

          echo "Falha ao publicar a tag ${WINDOWS_TAG}"
          exit 1

      - name: Publish Windows release
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          MERGE_SHA: ${{ needs.prepare-release.outputs.merge_sha }}
          APP_VERSION: ${{ needs.prepare-release.outputs.app_version }}
          WINDOWS_TAG: ${{ needs.prepare-release.outputs.windows_tag }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          SEMVER_LABEL: ${{ needs.prepare-release.outputs.semver_label }}
          PLATFORM_LABEL: ${{ needs.prepare-release.outputs.platform_label }}
          BASE_REF: ${{ github.event.pull_request.base.ref }}
        run: |
          set -euo pipefail

          windows_file="$(find dist/windows -type f -name 'LachhhTools-Windows-v*.exe' | head -n 1)"
          test -n "${windows_file}" && test -f "${windows_file}"
          asset_name="$(basename "${windows_file}")"

          body=$(cat <<EOF
          Release gerada automaticamente a partir do merge do PR #${PR_NUMBER} em \`${BASE_REF}\`.

          WINDOWS APENAS:
          - Versao da aplicacao: \`v${APP_VERSION}\`
          - SemVer: \`${SEMVER_LABEL}\`
          - Plataforma: \`${PLATFORM_LABEL}\`
          - Arquivo para download: \`${asset_name}\`
          EOF
          )

          if ! gh release view "${WINDOWS_TAG}" --repo "${REPOSITORY}" >/dev/null 2>&1; then
            gh release create "${WINDOWS_TAG}" "${windows_file}" \
              --repo "${REPOSITORY}" \
              --title "LachhhTools ${WINDOWS_TAG} (WINDOWS)" \
              --notes "${body}" \
              --target "${MERGE_SHA}"
            echo "Release criada: ${WINDOWS_TAG}"
            exit 0
          fi

          if gh release view "${WINDOWS_TAG}" --repo "${REPOSITORY}" --json assets --jq '.assets[].name' | grep -Fxq "${asset_name}"; then
            echo "Asset ja publicado em ${WINDOWS_TAG}: ${asset_name}"
            exit 0
          fi

          gh release edit "${WINDOWS_TAG}" \
            --repo "${REPOSITORY}" \
            --title "LachhhTools ${WINDOWS_TAG} (WINDOWS)" \
            --notes "${body}"

          gh release upload "${WINDOWS_TAG}" "${windows_file}" \
            --repo "${REPOSITORY}" \
            --clobber

          echo "Asset publicado em ${WINDOWS_TAG}: ${asset_name}"

  integration-macos:
    name: Integration Gate (macOS)
    needs: prepare-release
    if: needs.prepare-release.outputs.release_macos == 'true'
    runs-on: macos-latest

    steps:
      - name: Checkout merge commit
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare-release.outputs.merge_sha }}

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "11"

      - name: Setup HARMAN AIR SDK
        uses: joshtynjala/setup-adobe-air-action@v2
        with:
          air-version: "50.2.4.2"
          accept-license: true

      - name: Run macOS integration gate
        shell: bash
        run: |
          chmod +x ./scripts/macos-integration-gate.sh
          ./scripts/macos-integration-gate.sh "$PWD"

  build-macos-release:
    name: Build Release (macOS)
    needs:
      - prepare-release
      - integration-macos
    if: needs.prepare-release.outputs.release_macos == 'true'
    runs-on: macos-latest

    steps:
      - name: Checkout merge commit
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare-release.outputs.merge_sha }}

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "11"

      - name: Setup HARMAN AIR SDK
        uses: joshtynjala/setup-adobe-air-action@v2
        with:
          air-version: "50.2.4.2"
          accept-license: true

      - name: Build macOS bundle
        shell: bash
        env:
          APP_VERSION: ${{ needs.prepare-release.outputs.app_version }}
          PACKAGE_TARGET: bundle
        run: |
          ./scripts/build.sh
          test -d "./installers/LachhhTools.app"
          test -f "./bin/TwitchGiveawayTool.swf"

      - name: Post-build smoke test (macOS artifacts)
        shell: bash
        run: |
          test -f "./bin/TwitchGiveawayTool.swf"
          test -d "./installers/LachhhTools.app"

      - name: Archive macOS release asset
        shell: bash
        env:
          APP_VERSION: ${{ needs.prepare-release.outputs.app_version }}
        run: |
          ditto -c -k --sequesterRsrc --keepParent \
            "./installers/LachhhTools.app" \
            "./installers/LachhhTools-macOS-v${APP_VERSION}.zip"
          test -f "./installers/LachhhTools-macOS-v${APP_VERSION}.zip"

      - name: Upload macOS release artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-macos-v${{ needs.prepare-release.outputs.app_version }}
          path: |
            installers/LachhhTools-macOS-v${{ needs.prepare-release.outputs.app_version }}.zip

  publish-macos-release:
    name: Publish Release (macOS)
    needs:
      - prepare-release
      - build-macos-release
    if: needs.prepare-release.outputs.release_macos == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout merge commit
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare-release.outputs.merge_sha }}
          fetch-depth: 0

      - name: Fetch tags
        run: |
          git fetch --force --tags origin

      - name: Configure Git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Download macOS release artifact
        uses: actions/download-artifact@v4
        with:
          name: release-macos-v${{ needs.prepare-release.outputs.app_version }}
          path: dist/macos

      - name: Ensure macOS tag exists
        env:
          MERGE_SHA: ${{ needs.prepare-release.outputs.merge_sha }}
          MAC_TAG: ${{ needs.prepare-release.outputs.mac_tag }}
        run: |
          set -euo pipefail

          if git ls-remote --tags --refs origin "refs/tags/${MAC_TAG}" | grep -q .; then
            echo "Tag ja existe no remoto: ${MAC_TAG}"
            exit 0
          fi

          git tag -a "${MAC_TAG}" "${MERGE_SHA}" -m "Release macOS ${MAC_TAG}"

          if git push origin "refs/tags/${MAC_TAG}"; then
            echo "Tag publicada: ${MAC_TAG}"
            exit 0
          fi

          git fetch --force --tags origin
          if git ls-remote --tags --refs origin "refs/tags/${MAC_TAG}" | grep -q .; then
            echo "Tag confirmada apos rechecagem: ${MAC_TAG}"
            exit 0
          fi

          echo "Falha ao publicar a tag ${MAC_TAG}"
          exit 1

      - name: Publish macOS release
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          MERGE_SHA: ${{ needs.prepare-release.outputs.merge_sha }}
          APP_VERSION: ${{ needs.prepare-release.outputs.app_version }}
          MAC_TAG: ${{ needs.prepare-release.outputs.mac_tag }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          SEMVER_LABEL: ${{ needs.prepare-release.outputs.semver_label }}
          PLATFORM_LABEL: ${{ needs.prepare-release.outputs.platform_label }}
          BASE_REF: ${{ github.event.pull_request.base.ref }}
        run: |
          set -euo pipefail

          mac_file="$(find dist/macos -type f -name 'LachhhTools-macOS-v*.zip' | head -n 1)"
          test -n "${mac_file}" && test -f "${mac_file}"
          asset_name="$(basename "${mac_file}")"

          body=$(cat <<EOF
          Release gerada automaticamente a partir do merge do PR #${PR_NUMBER} em \`${BASE_REF}\`.

          macOS APENAS:
          - Versao da aplicacao: \`v${APP_VERSION}\`
          - SemVer: \`${SEMVER_LABEL}\`
          - Plataforma: \`${PLATFORM_LABEL}\`
          - Arquivo para download: \`${asset_name}\`
          EOF
          )

          if ! gh release view "${MAC_TAG}" --repo "${REPOSITORY}" >/dev/null 2>&1; then
            gh release create "${MAC_TAG}" "${mac_file}" \
              --repo "${REPOSITORY}" \
              --title "LachhhTools v${APP_VERSION} (macOS)" \
              --notes "${body}" \
              --target "${MERGE_SHA}"
            echo "Release criada: ${MAC_TAG}"
            exit 0
          fi

          if gh release view "${MAC_TAG}" --repo "${REPOSITORY}" --json assets --jq '.assets[].name' | grep -Fxq "${asset_name}"; then
            echo "Asset ja publicado em ${MAC_TAG}: ${asset_name}"
            exit 0
          fi

          gh release edit "${MAC_TAG}" \
            --repo "${REPOSITORY}" \
            --title "LachhhTools v${APP_VERSION} (macOS)" \
            --notes "${body}"

          gh release upload "${MAC_TAG}" "${mac_file}" \
            --repo "${REPOSITORY}" \
            --clobber

          echo "Asset publicado em ${MAC_TAG}: ${asset_name}"

  release-summary:
    name: Release Summary
    needs:
      - prepare-release
      - publish-windows-release
      - publish-macos-release
    if: >-
      always() &&
      needs.prepare-release.result == 'success' &&
      (needs.publish-windows-release.result == 'success' || needs.publish-windows-release.result == 'skipped') &&
      (needs.publish-macos-release.result == 'success' || needs.publish-macos-release.result == 'skipped')
    runs-on: ubuntu-latest

    steps:
      - name: Publish summary
        run: |
          {
            echo "## Published Releases"
            echo "- SemVer label: \`${{ needs.prepare-release.outputs.semver_label }}\`"
            echo "- Platform label: \`${{ needs.prepare-release.outputs.platform_label }}\`"
            echo "- Windows enabled: \`${{ needs.prepare-release.outputs.release_windows }}\`"
            echo "- macOS enabled: \`${{ needs.prepare-release.outputs.release_macos }}\`"
            echo "- Windows tag: \`${{ needs.prepare-release.outputs.windows_tag }}\`"
            echo "- macOS tag: \`${{ needs.prepare-release.outputs.mac_tag }}\`"
            echo "- Windows release job: \`${{ needs.publish-windows-release.result }}\`"
            echo "- macOS release job: \`${{ needs.publish-macos-release.result }}\`"
          } >> "${GITHUB_STEP_SUMMARY}"
