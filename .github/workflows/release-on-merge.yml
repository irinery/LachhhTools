          git tag -a "${WINDOWS_TAG}" "${MERGE_SHA}" -m "Release Windows ${WINDOWS_TAG}"

          if git push origin "refs/tags/${WINDOWS_TAG}"; then
            echo "Tag publicada: ${WINDOWS_TAG}"
            exit 0
          fi

          git fetch --force --tags origin
          if git ls-remote --tags --refs origin "refs/tags/${WINDOWS_TAG}" | grep -q .; then
            echo "Tag confirmada apos rechecagem: ${WINDOWS_TAG}"
            exit 0
          fi

          echo "Falha ao publicar a tag ${WINDOWS_TAG}"
          exit 1

      - name: Publish Windows release
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          MERGE_SHA: ${{ needs.prepare-release.outputs.merge_sha }}
          APP_VERSION: ${{ needs.prepare-release.outputs.app_version }}
          WINDOWS_TAG: ${{ needs.prepare-release.outputs.windows_tag }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          SEMVER_LABEL: ${{ needs.prepare-release.outputs.semver_label }}
          PLATFORM_LABEL: ${{ needs.prepare-release.outputs.platform_label }}
          BASE_REF: ${{ github.event.pull_request.base.ref }}
        run: |
          set -euo pipefail

          windows_file="$(find dist/windows -type f -name 'LachhhTools-Windows-v*.exe' | head -n 1)"
          test -n "${windows_file}" && test -f "${windows_file}"
          asset_name="$(basename "${windows_file}")"

          body=$(cat <<EOF
          Release gerada automaticamente a partir do merge do PR #${PR_NUMBER} em \`${BASE_REF}\`.

          WINDOWS APENAS:
          - Versao da aplicacao: \`v${APP_VERSION}\`
          - SemVer: \`${SEMVER_LABEL}\`
          - Plataforma: \`${PLATFORM_LABEL}\`
          - Arquivo para download: \`${asset_name}\`
          EOF
          )

          if ! gh release view "${WINDOWS_TAG}" --repo "${REPOSITORY}" >/dev/null 2>&1; then
            gh release create "${WINDOWS_TAG}" "${windows_file}" \
              --repo "${REPOSITORY}" \
              --title "LachhhTools ${WINDOWS_TAG} (WINDOWS)" \
              --notes "${body}" \
              --target "${MERGE_SHA}"
            echo "Release criada: ${WINDOWS_TAG}"
            exit 0
          fi

          if gh release view "${WINDOWS_TAG}" --repo "${REPOSITORY}" --json assets --jq '.assets[].name' | grep -Fxq "${asset_name}"; then
            echo "Asset ja publicado em ${WINDOWS_TAG}: ${asset_name}"
            exit 0
          fi

          gh release edit "${WINDOWS_TAG}" \
            --repo "${REPOSITORY}" \
            --title "LachhhTools ${WINDOWS_TAG} (WINDOWS)" \
            --notes "${body}"

          gh release upload "${WINDOWS_TAG}" "${windows_file}" \
            --repo "${REPOSITORY}" \
            --clobber

          echo "Asset publicado em ${WINDOWS_TAG}: ${asset_name}"

