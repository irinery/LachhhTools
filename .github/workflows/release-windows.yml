name: Release Windows (EXE)

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release-windows:
    name: Build + Release (Windows Only)
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "11"

      - name: Setup HARMAN AIR SDK
        uses: joshtynjala/setup-adobe-air-action@v2
        with:
          air-version: "50.2.4.2"
          accept-license: true

      - name: Resolve Version from Tag
        id: version
        shell: powershell
        run: |
          $Tag = "${{ github.ref_name }}"
          $Version = $Tag.TrimStart("v")
          "tag=$Tag" >> $env:GITHUB_OUTPUT
          "version=$Version" >> $env:GITHUB_OUTPUT
          Write-Host "Tag: $Tag"
          Write-Host "App version: $Version"

      - name: Build Windows Executable
        shell: powershell
        env:
          APP_VERSION: ${{ steps.version.outputs.version }}
        run: |
          .\scripts\build.ps1 -PackageTarget native
          if (-not (Test-Path ".\installers\LachhhTools.exe")) {
            throw "Executável não encontrado em installers/LachhhTools.exe"
          }

      - name: Create GitHub Release (Windows Only)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: LachhhTools ${{ steps.version.outputs.tag }} (WINDOWS)
          body: |
            Release gerada automaticamente por tag de versão.

            WINDOWS APENAS:
            - Arquivo para download: `LachhhTools.exe`
          files: |
            installers/LachhhTools.exe
          fail_on_unmatched_files: true
