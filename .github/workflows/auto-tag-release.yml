name: Auto Tag Release (master merge)

on:
  pull_request:
    types:
      - closed

permissions:
  contents: write
  pull-requests: read

concurrency:
  group: auto-tag-release-master
  cancel-in-progress: false

jobs:
  tag-next-version:
    name: Calculate and Publish Release Tags
    if: >
      github.event.pull_request.merged == true &&
      github.event.pull_request.base.ref == 'master'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.ref }}
          fetch-depth: 0

      - name: Configure Git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Fetch all tags
        run: |
          git fetch --force --tags origin

      - name: Resolve bump strategy from PR labels
        id: bump
        env:
          LABELS_JSON: ${{ toJson(github.event.pull_request.labels.*.name) }}
        run: |
          bump="patch"
          if echo "${LABELS_JSON}" | jq -e 'index("semver:major")' >/dev/null; then
            bump="major"
          elif echo "${LABELS_JSON}" | jq -e 'index("semver:minor")' >/dev/null; then
            bump="minor"
          elif echo "${LABELS_JSON}" | jq -e 'index("semver:patch")' >/dev/null; then
            bump="patch"
          fi

          echo "Bump strategy: ${bump}"
          echo "bump=${bump}" >> "${GITHUB_OUTPUT}"

      - name: Calculate next version and target tags
        id: version
        env:
          BUMP: ${{ steps.bump.outputs.bump }}
        run: |
          latest_tag="$(git tag --list --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -n 1 || true)"
          if [[ -z "${latest_tag}" ]]; then
            latest_tag="v0.0.0"
          fi

          raw_version="${latest_tag#v}"
          IFS='.' read -r major minor patch <<< "${raw_version}"

          case "${BUMP}" in
            major)
              major=$((major + 1))
              minor=0
              patch=0
              ;;
            minor)
              minor=$((minor + 1))
              patch=0
              ;;
            patch)
              patch=$((patch + 1))
              ;;
            *)
              echo "Bump inválido: ${BUMP}"
              exit 1
              ;;
          esac

          next_tag="v${major}.${minor}.${patch}"
          next_mac_tag="${next_tag}-mac"

          echo "Latest base tag: ${latest_tag}"
          echo "Next Windows tag: ${next_tag}"
          echo "Next macOS tag: ${next_mac_tag}"

          echo "latest=${latest_tag}" >> "${GITHUB_OUTPUT}"
          echo "next=${next_tag}" >> "${GITHUB_OUTPUT}"
          echo "next_mac=${next_mac_tag}" >> "${GITHUB_OUTPUT}"

      - name: Resolve merge commit SHA
        id: merge
        run: |
          merge_sha="${{ github.event.pull_request.merge_commit_sha }}"
          if [[ -z "${merge_sha}" ]]; then
            echo "merge_commit_sha ausente no evento."
            exit 1
          fi
          echo "merge_sha=${merge_sha}" >> "${GITHUB_OUTPUT}"
          echo "Using merge commit: ${merge_sha}"

      - name: Check existing tags (idempotent mode)
        id: existing
        env:
          NEXT_TAG: ${{ steps.version.outputs.next }}
          NEXT_MAC_TAG: ${{ steps.version.outputs.next_mac }}
        run: |
          win_exists="false"
          mac_exists="false"

          if git rev-parse -q --verify "refs/tags/${NEXT_TAG}" >/dev/null; then
            win_exists="true"
          fi

          if git rev-parse -q --verify "refs/tags/${NEXT_MAC_TAG}" >/dev/null; then
            mac_exists="true"
          fi

          if [[ "${win_exists}" == "true" && "${mac_exists}" == "true" ]]; then
            skip_all="true"
            echo "Ambas as tags já existem. Nada a fazer."
          else
            skip_all="false"
          fi

          echo "win_exists=${win_exists}" >> "${GITHUB_OUTPUT}"
          echo "mac_exists=${mac_exists}" >> "${GITHUB_OUTPUT}"
          echo "skip_all=${skip_all}" >> "${GITHUB_OUTPUT}"

      - name: Create missing local tags
        if: steps.existing.outputs.skip_all != 'true'
        env:
          MERGE_SHA: ${{ steps.merge.outputs.merge_sha }}
          NEXT_TAG: ${{ steps.version.outputs.next }}
          NEXT_MAC_TAG: ${{ steps.version.outputs.next_mac }}
          WIN_EXISTS: ${{ steps.existing.outputs.win_exists }}
          MAC_EXISTS: ${{ steps.existing.outputs.mac_exists }}
        run: |
          if [[ "${WIN_EXISTS}" != "true" ]]; then
            git tag -a "${NEXT_TAG}" "${MERGE_SHA}" -m "Release Windows ${NEXT_TAG}"
            echo "Tag criada localmente: ${NEXT_TAG}"
          else
            echo "Tag já existe localmente/remoto: ${NEXT_TAG}"
          fi

          if [[ "${MAC_EXISTS}" != "true" ]]; then
            git tag -a "${NEXT_MAC_TAG}" "${MERGE_SHA}" -m "Release macOS ${NEXT_TAG}"
            echo "Tag criada localmente: ${NEXT_MAC_TAG}"
          else
            echo "Tag já existe localmente/remoto: ${NEXT_MAC_TAG}"
          fi

      - name: Push missing tags safely
        if: steps.existing.outputs.skip_all != 'true'
        env:
          NEXT_TAG: ${{ steps.version.outputs.next }}
          NEXT_MAC_TAG: ${{ steps.version.outputs.next_mac }}
          WIN_EXISTS: ${{ steps.existing.outputs.win_exists }}
          MAC_EXISTS: ${{ steps.existing.outputs.mac_exists }}
        run: |
          push_and_verify() {
            local tag_name="$1"

            if git ls-remote --tags --refs origin "refs/tags/${tag_name}" | grep -q .; then
              echo "Tag já existe no remoto: ${tag_name}"
              return 0
            fi

            set +e
            git push origin "refs/tags/${tag_name}"
            push_exit=$?
            set -e

            if [[ ${push_exit} -ne 0 ]]; then
              echo "Push falhou para ${tag_name}, validando se já existe no remoto..."
            fi

            if git ls-remote --tags --refs origin "refs/tags/${tag_name}" | grep -q .; then
              echo "Tag confirmada no remoto: ${tag_name}"
              return 0
            fi

            echo "Não foi possível publicar a tag ${tag_name}"
            return 1
          }

          if [[ "${WIN_EXISTS}" != "true" ]]; then
            push_and_verify "${NEXT_TAG}"
          fi

          if [[ "${MAC_EXISTS}" != "true" ]]; then
            push_and_verify "${NEXT_MAC_TAG}"
          fi

      - name: Summary
        run: |
          {
            echo "## Auto Tag Release"
            echo "- PR #${{ github.event.pull_request.number }} merged into master"
            echo "- Bump: \`${{ steps.bump.outputs.bump }}\`"
            echo "- Latest base tag: \`${{ steps.version.outputs.latest }}\`"
            echo "- Windows tag: \`${{ steps.version.outputs.next }}\`"
            echo "- macOS tag: \`${{ steps.version.outputs.next_mac }}\`"
            echo "- Skip mode: \`${{ steps.existing.outputs.skip_all }}\`"
          } >> "${GITHUB_STEP_SUMMARY}"
