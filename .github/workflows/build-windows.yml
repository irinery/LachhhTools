name: CI Build (Windows Preview)

on:
  push:
    branches-ignore: [ "main", "master" ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  prepare-version:
    name: Resolve Preview Version
    runs-on: ubuntu-latest
    outputs:
      app_version: ${{ steps.version.outputs.app_version }}
      artifact_suffix: ${{ steps.version.outputs.artifact_suffix }}
      windows_tag: ${{ steps.version.outputs.windows_tag }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve preview version
        id: version
        uses: ./.github/actions/resolve-release-version
        with:
          labels_json: "[]"
          pr_number: ""
          sha: ${{ github.sha }}
          preview_mode: "true"
          fallback_semver_label: "semver:patch"
          fallback_platform_label: "platform:windows"

      - name: Preview summary
        run: |
          {
            echo "## Windows Preview"
            echo "- App version: \`v${{ steps.version.outputs.app_version }}\`"
            echo "- SemVer label: \`${{ steps.version.outputs.semver_label }}\`"
            echo "- Platform label: \`${{ steps.version.outputs.platform_label }}\`"
            echo "- Windows tag preview: \`${{ steps.version.outputs.windows_tag }}\`"
            echo "- Artifact suffix: \`${{ steps.version.outputs.artifact_suffix }}\`"
          } >> "${GITHUB_STEP_SUMMARY}"

  build-windows:
    name: Build + Validate (Windows Preview)
    needs: prepare-version
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "11"

      - name: Setup HARMAN AIR SDK
        uses: joshtynjala/setup-adobe-air-action@v2
        with:
          air-version: "50.2.4.2"
          accept-license: true

      - name: Build application (Windows Preview)
        shell: powershell
        env:
          APP_VERSION: ${{ needs.prepare-version.outputs.app_version }}
        run: |
          .\scripts\build.ps1

      - name: Validate Windows build assets
        shell: powershell
        run: |
          .\scripts\validate-windows-assets.ps1 `
            -RootDir "$PWD" `
            -ReportDir ".\build\reports"

      - name: Post-build smoke test (Windows Preview)
        shell: powershell
        run: |
          $required = @(
            ".\bin\TwitchGiveawayTool.swf",
            ".\installers\LachhhTools.exe",
            ".\build\reports\windows-assets-validation.json",
            ".\build\reports\windows-assets-validation.txt"
          )
          foreach ($path in $required) {
            if (-not (Test-Path $path)) {
              throw "Arquivo obrigatorio ausente no smoke test: $path"
            }
          }
          $exeSize = (Get-Item ".\installers\LachhhTools.exe").Length
          if ($exeSize -le 1MB) {
            throw "Executavel com tamanho inesperado (<= 1MB): $exeSize bytes"
          }

      - name: Critical smoke test (Windows Preview)
        shell: powershell
        run: |
          .\scripts\windows-critical-smoke.ps1 `
            -RootDir "$PWD" `
            -ValidationReportPath ".\build\reports\windows-assets-validation.json"

      - name: Create versioned preview asset
        shell: powershell
        env:
          APP_VERSION: ${{ needs.prepare-version.outputs.app_version }}
        run: |
          $versionedExe = ".\installers\LachhhTools-Windows-v$env:APP_VERSION.exe"
          Copy-Item ".\installers\LachhhTools.exe" $versionedExe -Force
          if (-not (Test-Path $versionedExe)) {
            throw "Executavel versionado nao encontrado: $versionedExe"
          }

      - name: Upload artifacts (Windows Preview)
        uses: actions/upload-artifact@v4
        with:
          name: LachhhTools-Windows-${{ needs.prepare-version.outputs.artifact_suffix }}
          path: |
            bin/TwitchGiveawayTool.swf
            installers/LachhhTools-Windows-v${{ needs.prepare-version.outputs.app_version }}.exe
            build/reports/windows-assets-validation.json
            build/reports/windows-assets-validation.txt
            build/reports/windows-critical-smoke.json
            build/reports/windows-critical-smoke.txt
